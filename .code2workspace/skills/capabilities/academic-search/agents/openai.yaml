display_name: Academic Search
short_description: Search PubMed, Springer, and bioRxiv papers reliably, with optional abstracts/details
default_prompt: Use $academic-search for PubMed, paper, literature, abstract, DOI, latest study, and evidence-backed research requests in biomedicine, virology, medicine, biology, and bioinformatics. Run `python3 skills/capabilities/academic-search/scripts/search_tools.py ...` from the workspace root before generic web search when the user explicitly asks for papers or literature. Pass `--max-results` for explicit counts and `--details` for abstracts, authors, journal/source, DOI, or detailed paper content.
